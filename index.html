<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홈쇼핑-시청환경조회</title></title>
<style>
  :root {
    --paper: #FFFFFF;
    --paper-dim: #F5F6F8;
    --paper-dim2: #EEF0F3;
    --ink: #1A1D24;
    --ink-soft: #6B7280;
    --ink-faint: #9CA3AF;
    --rule: #E5E7EB;
    --terrestrial: #2563EB;
    --terrestrial-soft: #EFF4FF;
    --comprehensive: #7C3AED;
    --comprehensive-soft: #F5F0FE;
    --now-accent: #2563EB;
    --now-bg: #EFF4FF;
    --brand-blue: #2563EB;
    --brand-blue-hover: #1D4ED8;
    --brand-blue-soft: #EFF4FF;
    --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.05);
    --shadow-md: 0 4px 10px rgba(16, 24, 40, 0.08);
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .masthead {
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    padding: 14px 24px;
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
  }

  .masthead .kicker {
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 9.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 0;
  }

  .masthead h1 {
    font-size: 18px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  .masthead .sub {
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 11.5px;
    color: var(--ink-soft);
    margin: 0;
  }

  .controls {
    max-width: 1400px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 5;
    border-bottom: 1px solid var(--rule);
  }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 6px 8px;
    box-shadow: var(--shadow-sm);
  }

  .date-nav button.arrow {
    background: none;
    border: none;
    font-size: 16px;
    color: var(--ink-soft);
    cursor: pointer;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .date-nav button.arrow:hover { background: var(--paper-dim); color: var(--ink); }
  .date-nav button.arrow:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .date-nav button.arrow:disabled:hover { background: none; color: var(--ink-soft); }

  .date-display {
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 4px 2px;
  }

  .date-display .date-text {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
  }

  .date-display .cal-icon {
    font-size: 13px;
    opacity: 0.6;
  }

  .date-display input[type="date"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    border: none;
  }

  .today-badge {
    font-size: 10px;
    background: var(--brand-blue);
    color: #fff;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }

  .today-btn {
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    background: var(--paper-dim);
    color: var(--ink);
    border: 1px solid var(--rule);
    border-radius: 7px;
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .today-btn:hover { background: var(--paper-dim2); }

  .search-btn {
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    background: var(--brand-blue);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 9px 16px;
    cursor: pointer;
    transition: background 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .search-btn:hover { background: var(--brand-blue-hover); }

  .legend {
    display: flex;
    gap: 16px;
    font-size: 11.5px;
    color: var(--ink-soft);
  }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .legend .dot { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }
  .dot.terrestrial { background: var(--terrestrial); }
  .dot.comprehensive { background: var(--comprehensive); }

  .weather-bar {
    max-width: 1400px;
    margin: 0 auto;
    padding: 8px 24px 10px;
    text-align: center;
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 12.5px;
    color: var(--ink-soft);
    border-bottom: 1px solid var(--rule);
  }
  .weather-bar a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dotted var(--ink-soft);
  }
  .weather-bar a:hover { color: var(--ink); border-bottom-color: var(--ink); }
  .weather-bar .w-temp-max { color: var(--comprehensive); font-weight: 700; }
  .weather-bar .w-temp-min { color: var(--terrestrial); font-weight: 700; }
  .weather-bar .w-rain { color: var(--now-accent); font-weight: 600; }
  .weather-bar .w-sep { margin: 0 8px; opacity: 0.4; }
  .weather-bar .w-empty { font-style: italic; opacity: 0.6; }

  .grid-wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .scroll-x {
    overflow: auto;
    max-height: calc(100vh - 130px);
    background: var(--paper);
  }

  table.schedule {
    width: 100%;
    min-width: 880px;
    border-collapse: collapse;
    font-family: 'Pretendard', -apple-system, sans-serif;
  }

  table.schedule thead th {
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 3;
    padding: 12px 6px 13px;
    border-bottom: 1px solid var(--rule);
    font-size: 13.5px;
    font-weight: 700;
    text-align: center;
    white-space: nowrap;
    color: var(--ink);
  }

  table.schedule thead th.time-col {
    width: 56px;
    text-align: center;
    padding-left: 0;
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 10.5px;
    color: var(--ink-faint);
    font-weight: 600;
    letter-spacing: 0.06em;
  }

  table.schedule thead th .ch-band {
    display: block;
    height: 3px;
    border-radius: 2px;
    margin-top: 7px;
  }
  th.terrestrial .ch-band { background: var(--terrestrial); }
  th.comprehensive .ch-band { background: var(--comprehensive); }

  table.schedule td {
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
    padding: 0;
  }

  td.time-col {
    font-size: 11px;
    color: var(--ink-faint);
    text-align: center;
    padding: 6px 0 0;
    white-space: nowrap;
    font-weight: 600;
    border-right: 1px solid var(--rule);
    background: var(--paper-dim);
  }

  td.time-col .hh {
    font-size: 13px;
    color: var(--ink-soft);
  }

  .prog-cell {
    position: relative;
    border-right: 1px solid var(--rule);
  }

  .prog-block {
    padding: 8px 10px;
    font-size: 12.5px;
    line-height: 1.4;
    border-bottom: 1px solid var(--rule);
    min-height: 16px;
    transition: background 0.12s;
  }
  .prog-block:hover { background: var(--paper-dim); }

  .prog-block .ptime {
    font-size: 10px;
    color: var(--ink-faint);
    display: block;
    margin-bottom: 2px;
    font-weight: 600;
  }

  .prog-block.now {
    background: var(--now-bg);
    border-left: 3px solid var(--now-accent);
    padding-left: 8px;
  }
  .prog-block.now:hover { background: var(--now-bg); }
  .prog-block.now .ptime { color: var(--now-accent); }
  .prog-block.now .ptime::before {
    content: "● ON AIR  ";
    letter-spacing: 0.02em;
  }

  .prog-block.empty {
    color: var(--ink-faint);
    font-style: normal;
    font-size: 11px;
  }

  .no-data {
    max-width: 1400px;
    margin: 60px auto;
    text-align: center;
    font-family: 'Pretendard', -apple-system, sans-serif;
    color: var(--ink-soft);
    padding: 0 24px;
  }
  .no-data .big { font-size: 15px; color: var(--ink); margin-bottom: 6px; }

  @media (max-width: 720px) {
    .controls { gap: 10px; }
    table.schedule { min-width: 760px; }
  }

  /* ============ 탭 전환 ============ */
  .main-tabs {
    display: flex;
    gap: 2px;
    margin-left: 4px;
  }
  .main-tabs button {
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 13px;
    font-weight: 600;
    background: none;
    border: none;
    border-radius: 6px;
    border-bottom: 2px solid transparent;
    padding: 7px 12px 6px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .main-tabs button.active {
    color: var(--brand-blue);
    background: var(--brand-blue-soft);
    border-bottom-color: transparent;
  }
  .main-tabs button:hover { color: var(--ink); background: var(--paper-dim); }
  .main-tabs button.active:hover { color: var(--brand-blue); background: var(--brand-blue-soft); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ============ 날씨 탭(달력) ============ */
  #tabWeather {
    --cold: #2563EB;
    --hot: #DC2626;
    --rain: #0891B2;
    --rain-bg: #ECFEFF;
    --today-bg: #EFF4FF;
    --today-border: #2563EB;
    --future-bg: #FAFAFB;
    font-family: 'Pretendard', -apple-system, sans-serif;
  }

  .weather-region-toggle {
    max-width: 880px;
    margin: 0 auto;
    padding: 14px 24px 0;
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .weather-region-toggle .hs-toggle-btn {
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    border: 1px solid var(--rule);
    background: var(--paper);
    color: var(--ink-soft);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
  }
  .weather-region-toggle .hs-toggle-btn.active {
    background: var(--brand-blue);
    border-color: var(--brand-blue);
    color: #fff;
  }

  .month-nav {
    max-width: 880px;
    margin: 0 auto;
    padding: 16px 24px 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .month-nav button {
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    font-size: 16px;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .month-nav button:hover { background: var(--rule); }
  .month-nav .month-label-wrap {
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 150px;
    justify-content: center;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
  }
  .month-nav .month-label-wrap:hover { background: #fff; }
  .month-nav .month-label {
    font-size: 19px;
    font-weight: 700;
    text-align: center;
    font-family: 'Pretendard', -apple-system, sans-serif;
  }
  .month-nav .month-cal-icon {
    font-size: 14px;
    opacity: 0.55;
  }

  .month-picker-panel {
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(27,26,23,0.12);
    padding: 10px;
    z-index: 20;
    display: none;
    width: 260px;
    max-height: 320px;
    overflow-y: auto;
  }
  .month-picker-panel.open { display: block; }

  .mpp-year-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 4px 6px;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--rule);
  }
  .mpp-year-row .mpp-year-label {
    font-size: 14px;
    font-weight: 700;
    font-family: 'Pretendard', -apple-system, sans-serif;
  }
  .mpp-year-row button {
    background: none;
    border: none;
    font-size: 14px;
    color: var(--ink-soft);
    cursor: pointer;
    width: 22px;
    height: 22px;
    border-radius: 5px;
  }
  .mpp-year-row button:hover { background: var(--rule); }

  .mpp-month-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
  }
  .mpp-month-grid button {
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 12px;
    padding: 7px 0;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
  }
  .mpp-month-grid button:hover { background: var(--rule); }
  .mpp-month-grid button.current {
    background: var(--brand-blue);
    color: #fff;
    border-color: var(--brand-blue);
  }
  .mpp-month-grid button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .legend-row {
    width: 100%;
    max-width: 880px;
    margin: 0 auto;
    padding: 0 24px 14px;
    display: flex;
    justify-content: center;
    gap: 18px;
    font-size: 11px;
    color: var(--ink-soft);
    box-sizing: border-box;
  }
  .legend-row span { display: inline-flex; align-items: center; gap: 5px; }
  .legend-row .sw { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }
  .sw.min { background: var(--cold); }
  .sw.max { background: var(--hot); }
  .sw.rain { background: var(--rain); }

  .cal-wrap {
    max-width: 880px;
    margin: 0 auto 50px;
    padding: 0 24px;
  }

  table.calendar {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  table.calendar th {
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-soft);
    padding: 8px 4px;
    border-bottom: 1px solid var(--rule);
    text-align: center;
  }
  table.calendar th.sun { color: var(--hot); }
  table.calendar th.sat { color: var(--cold); }

  table.calendar td {
    border: 1px solid var(--rule);
    vertical-align: top;
    height: 92px;
    padding: 6px 7px;
    background: #fff;
  }
  table.calendar td.empty { background: var(--paper-dim); border: none; }
  table.calendar td.future-cell { background: var(--future-bg); }
  table.calendar td.today-cell {
    background: var(--today-bg);
    border: 1.5px solid var(--today-border);
  }

  .day-num {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .day-num.sun { color: var(--hot); }
  .day-num.sat { color: var(--cold); }

  .day-stats { font-size: 11px; line-height: 1.5; }
  .day-stats .row { display: flex; justify-content: space-between; gap: 4px; }
  .day-stats .min { color: var(--cold); font-weight: 600; }
  .day-stats .max { color: var(--hot); font-weight: 600; }
  .day-stats .rain { color: var(--rain); }
  .day-stats .rain.has-rain {
    background: var(--rain-bg);
    border-radius: 3px;
    padding: 0 3px;
  }
  .day-stats .ly {
    margin-top: 3px;
    color: var(--ink-soft);
    font-size: 9.5px;
    border-top: 1px dotted var(--rule);
    padding-top: 2px;
  }
  .no-data-cell {
    font-size: 10px;
    color: var(--rule);
    font-style: italic;
    margin-top: 8px;
  }

  @media (max-width: 700px) {
    table.calendar td { height: 72px; padding: 4px; font-size: 10px; }
    .day-stats { font-size: 9.5px; }
    .day-num { font-size: 11px; }
  }

  /* ============ 드라마/예능 탭 ============ */
  #tabDramaVariety {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 30px;
  }

  .dv-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    padding: 16px 0 14px;
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 5;
    border-bottom: 1px solid var(--rule);
  }

  .dv-week-label-wrap .date-text {
    font-size: 13.5px;
  }

  .dv-slicer {
    display: flex;
    gap: 4px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 9px;
    padding: 4px;
    box-shadow: var(--shadow-sm);
  }
  .dv-slicer button {
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    background: none;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .dv-slicer button.active {
    background: var(--brand-blue);
    color: #fff;
  }
  .dv-slicer button:hover:not(.active) { background: var(--paper-dim); color: var(--ink); }

  .dv-updated {
    text-align: center;
    font-size: 11px;
    color: var(--ink-faint);
    padding-bottom: 8px;
  }

  .dv-basis {
    text-align: center;
    font-size: 11px;
    color: var(--ink-soft);
    padding: 8px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin-bottom: 8px;
  }
  .dv-basis strong {
    color: var(--ink);
    font-weight: 600;
  }

  .dv-scroll {
    overflow: auto;
    background: var(--paper);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
  }

  table.dv-table {
    width: 100%;
    min-width: 1100px;
    border-collapse: collapse;
    font-family: 'Pretendard', -apple-system, sans-serif;
  }

  table.dv-table thead th {
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 3;
    padding: 12px 6px 13px;
    border-bottom: 1px solid var(--rule);
    font-size: 13.5px;
    font-weight: 700;
    text-align: center;
    white-space: nowrap;
    color: var(--ink);
  }
  table.dv-table thead th.dv-genre-col { width: 92px; }

  table.dv-table td.dv-genre-label {
    background: var(--paper-dim);
    font-weight: 700;
    font-size: 13px;
    color: var(--ink);
    text-align: center;
    vertical-align: top;
    padding: 14px 4px;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }

  table.dv-table td.dv-day-cell {
    border-right: 1px solid var(--rule);
    border-bottom: 2px solid var(--rule);
    vertical-align: top;
    padding: 0;
    min-width: 175px;
    background: var(--paper);
  }

  .dv-card {
    display: block;
    text-decoration: none;
    color: var(--ink);
    padding: 7px 9px 7px 11px;
    border-bottom: 1px dotted var(--rule);
    border-left: 4px solid var(--brand-blue);
    transition: background 0.12s;
  }
  .dv-card:last-child { border-bottom: none; }
  .dv-card:hover { background: var(--now-bg); }
  .dv-card.dv-cat-drama { border-left-color: var(--comprehensive); }
  .dv-card.dv-cat-variety { border-left-color: var(--terrestrial); }

  /* 고시청률 강조: 드라마 10%+, 예능 3%+ 일 때 노란색 배경으로 눈에 띄게 표시 */
  .dv-card.dv-high-rating {
    background: #FFF7D6;
    border-left-color: #F5B700;
  }
  .dv-card.dv-high-rating:hover {
    background: #FFF0B3;
  }
  .dv-card.dv-high-rating .dv-title {
    color: #7A5B00;
  }
  .dv-card.dv-high-rating .dv-rating {
    color: #B8860B;
  }

  .dv-card .dv-title {
    font-size: 12px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--ink);
    margin-bottom: 3px;
    display: block;
  }
  .dv-card .dv-title .dv-channel {
    color: #1B5E5A;
    font-weight: 800;
  }
  .dv-card .dv-meta {
    font-size: 10.5px;
    color: var(--ink-soft);
    display: block;
    margin-bottom: 2px;
  }
  .dv-card .dv-rating {
    color: #DC2626;
    font-weight: 700;
    font-size: 11px;
  }
  .dv-card .dv-rating-date {
    color: var(--ink-faint);
    font-weight: 500;
    font-size: 10px;
  }

  td.dv-empty-cell { background: var(--paper-dim); opacity: 0.4; }

  .dv-empty-row td {

function timeToMinutes(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function toLocalDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatDateLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  return `${dateStr} (${days[d.getDay()]})`;
}

    const resp = await fetch(`${path}${sep}t=${Date.now()}`);
    if (resp.ok) return await resp.json();
  } catch (e) { }
  return null;
}

async function getWeatherForDate(dateStr) {
  if (location.protocol === 'file:') return null;

  if (_weatherCache.forecast === null) {
    _weatherCache.forecast = await fetchJsonSafe('./weather/forecast/latest.json') || {};
  }
  if (_weatherCache.forecast[dateStr]) {
    const w = _weatherCache.forecast[dateStr];
    return { ...w, kind: 'forecast' };
  }

  const yearMonth = dateStr.slice(0, 7);
  if (!(yearMonth in _weatherCache.asosMonths)) {
    _weatherCache.asosMonths[yearMonth] = await fetchJsonSafe(`./weather/asos/${yearMonth}.json`);
  }
  const monthData = _weatherCache.asosMonths[yearMonth];
  if (monthData && monthData[dateStr]) {
    const w = monthData[dateStr];
    return { ...w, kind: 'asos' };
  }

  return null;
}

function renderWeatherBar(weather) {

  if (!weather) {
    bar.innerHTML = '<span class="w-empty">이 날짜의 날씨 정보가 없습니다</span>';

  const minTa = weather.minTa;
  const maxTa = weather.maxTa;
  const minStr = (minTa === null || minTa === undefined) ? '–' : `${minTa.toFixed(0)}°`;

    rainStr = `비 ${Math.round(weather.pop_max)}%`;

    `<span class="w-sep">·</span>` +
    `<span class="w-rain">${rainStr}</span>` +
    `</a>`;
}

function isToday(dateStr) {
  const today = new Date();
  const ds = toLocalDateStr(today);
  return dateStr === ds;
}

async function getDataForDate(dateStr) {
  if (INLINE_DATA[dateStr]) return INLINE_DATA[dateStr];

  if (location.protocol !== 'file:') {
    try {
      const resp = await fetch(`./data/${dateStr}.json?t=${Date.now()}`);
      if (resp.ok) return await resp.json();
    } catch (e) { }
  }
  return null;
}

function buildHourMarks() {
  const marks = [];
  for (let h = 0; h < 24; h++) marks.push(h);
  return marks;
}

function nowWithinDay(dateStr) {
  if (!isToday(dateStr)) return null;
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}

function renderGrid(data, dateStr) {
  const wrap = document.getElementById('gridWrap');
  const noData = document.getElementById('noData');

  if (!data) {
    wrap.innerHTML = '';
    noData.style.display = 'block';
    return;
  }
  noData.style.display = 'none';

  const nowMin = nowWithinDay(dateStr);
  const hours = buildHourMarks();

  const channelPrograms = {};
  CHANNELS.forEach(ch => {
    const list = (data[ch.key] || []).slice().sort((a,b) => timeToMinutes(a.start) - timeToMinutes(b.start));
    channelPrograms[ch.key] = list;
  });

  let html = '<div class="scroll-x"><table class="schedule"><thead><tr>';
  html += '<th class="time-col">시간</th>';
  CHANNELS.forEach(ch => {
    html += `<th class="${ch.group}">${ch.key}<span class="ch-band"></span></th>`;
  });
  html += '</tr></thead><tbody>';

  hours.forEach(h => {
    html += '<tr>';
    html += `<td class="time-col"><span class="hh">${String(h).padStart(2,'0')}</span>:00</td>`;

    CHANNELS.forEach(ch => {
      const progs = channelPrograms[ch.key];
      const inThisHour = progs.filter(p => Math.floor(timeToMinutes(p.start) / 60) === h);

      html += '<td class="prog-cell">';
      if (inThisHour.length === 0) {
        html += '<div class="prog-block empty">—</div>';
      } else {
        inThisHour.forEach(p => {
          const startMin = timeToMinutes(p.start);
          const endMin = p.end === '24:00' ? 24*60 : timeToMinutes(p.end);
          const isNow = nowMin !== null && nowMin >= startMin && nowMin < endMin;
          html += `<div class="prog-block${isNow ? ' now' : ''}">`;
          html += `<span class="ptime">${p.start}–${p.end === '24:00' ? '24:00' : p.end}</span>`;
          html += escapeHtml(p.title);
          html += '</div>';
        });
      }
      html += '</td>';
    });

    html += '</tr>';
  });

  html += '</tbody></table></div>';
  wrap.innerHTML = html;

  if (nowMin !== null) {
    const nowBlock = wrap.querySelector('.prog-block.now');
    if (nowBlock) {
      const scrollContainer = wrap.querySelector('.scroll-x');
      const row = nowBlock.closest('tr');
      if (scrollContainer && row) {
        const offset = row.offsetTop - 40;
        scrollContainer.scrollTop = Math.max(0, offset);
      }
    }
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function todayStr() { return toLocalDateStr(new Date()); }

async function loadMonthData(year, month, region) {
  const ym = `${year}-${String(month).padStart(2, '0')}`;
  const lastYearYm = `${year - 1}-${String(month).padStart(2, '0')}`;

  const [asos, forecast, lastYearAsos] = await Promise.all([
    fetchJsonSafe(`./weather/asos/${region}/${ym}.json`),
    fetchJsonSafe(`./weather/forecast/${region}/latest.json`),
    fetchJsonSafe(`./weather/asos/${region}/${lastYearYm}.json`),
  ]);

  return {
    asos: asos || {},
    forecast: forecast || {},
    lastYearAsos: lastYearAsos || {},
  };
}

function getDayData(dateStr, monthData) {
  if (monthData.forecast[dateStr]) {
    return { ...monthData.forecast[dateStr], kind: 'forecast' };
  }
  if (monthData.asos[dateStr]) {
    return { ...monthData.asos[dateStr], kind: 'asos' };
  }
  return null;
}

function getLastYearData(dateStr, monthData) {
  const d = new Date(dateStr + 'T00:00:00');
  const lyDateStr = `${d.getFullYear() - 1}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  return monthData.lastYearAsos[lyDateStr] || null;
}

function renderDayCell(year, month, day, monthData, today) {
  const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
  const dow = new Date(dateStr + 'T00:00:00').getDay();
  const isToday = dateStr === today;
  const isFuture = dateStr > today;

  const cellClasses = ['cal-cell'];
  if (isToday) cellClasses.push('today-cell');
  else if (isFuture) cellClasses.push('future-cell');

  const dowClass = dow === 0 ? 'sun' : (dow === 6 ? 'sat' : '');

  const data = getDayData(dateStr, monthData);

  let statsHtml;
  if (!data) {
    statsHtml = '<div class="no-data-cell">정보없음</div>';
  } else {
    const minStr = (data.minTa === null || data.minTa === undefined) ? '–' : `${data.minTa.toFixed(0)}°`;
    const maxStr = (data.maxTa === null || data.maxTa === undefined) ? '–' : `${data.maxTa.toFixed(0)}°`;

    let rainStr, hasRain;
    if (data.kind === 'forecast') {
      rainStr = `${Math.round(data.pop_max)}%`;
      hasRain = data.pop_max >= 30;
    } else {
      rainStr = `${data.sumRn.toFixed(1)}mm`;
      hasRain = data.sumRn > 0;
    }

    let lyHtml = '';
    const ly = getLastYearData(dateStr, monthData);
    if (ly && ly.minTa !== null && ly.maxTa !== null) {
      lyHtml = `<div class="ly">작년 ${ly.minTa.toFixed(0)}°/${ly.maxTa.toFixed(0)}°</div>`;
    }

    statsHtml =
      `<div class="day-stats">` +
      `<div class="row"><span class="min">최저 ${minStr}</span></div>` +
      `<div class="row"><span class="max">최고 ${maxStr}</span></div>` +
      `<div class="row"><span class="rain${hasRain ? ' has-rain' : ''}">비 ${rainStr}</span></div>` +
      lyHtml +
      `</div>`;
  }

  return `<td class="${cellClasses.join(' ')}">` +
         `<div class="day-num ${dowClass}">${day}</div>` +
         statsHtml +
         `</td>`;
}

async function renderMonth(year, month) {
  const ym = `${year}-${String(month).padStart(2, '0')}`;
  document.getElementById('monthLabel').textContent = `${year}.${String(month).padStart(2, '0')}`;
  if (document.getElementById('monthPickerPanel').classList.contains('open')) {
    renderMonthPickerPanel();
  }

  const monthData = await loadMonthData(year, month, weatherCurrentRegion);
  const today = todayStr();

  const firstDow = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();

  let html = '<table class="calendar"><thead><tr>';
  WEEKDAYS.forEach((w, i) => {
    const cls = i === 0 ? 'sun' : (i === 6 ? 'sat' : '');
    html += `<th class="${cls}">${w}</th>`;
  });
  html += '</tr></thead><tbody><tr>';

  for (let i = 0; i < firstDow; i++) html += '<td class="empty"></td>';

  let dow = firstDow;
  for (let day = 1; day <= daysInMonth; day++) {
    html += renderDayCell(year, month, day, monthData, today);
    dow++;
    if (dow === 7) {
      html += '</tr><tr>';
      dow = 0;
    }
  }
  while (dow !== 0 && dow !== 7) {
    html += '<td class="empty"></td>';
    dow++;
  }

  html += '</tr></tbody></table>';
  document.getElementById('calWrap').innerHTML = html;
}

let _hsLastDateStr = null;

async function hsRefresh(dateStr) {
  hsRenderCategoryLegend();
  document.getElementById('hsDateText').textContent = formatDateLabel(dateStr);
  document.getElementById('hsPrevDay').disabled = (dateStr <= HS_MIN_DATE);
  const wrap = document.getElementById('hsGridWrap');
  wrap.innerHTML = '<div style="text-align:center;padding:30px;color:var(--ink-soft);font-size:12px;">불러오는 중…</div>';

  const datasets = await Promise.all(
    HS_COMPANIES.map(c => hsLoadCompanyDate(c.code, hsCurrentBc, dateStr))
  );
  _hsLastDatasets = datasets;
  _hsLastDateStr = dateStr;

  hsRenderBody();
}

function hsMatchesFilter(p) {
  if (hsCategoryFilters.size > 0 && !hsCategoryFilters.has(p.category)) return false;
  if (p.start) {
    const hour = parseInt(p.start.split(':')[0], 10);
    if (!hsHourMatchesTimeFilter(hour)) return false;
  }
  return true;
}

function hsRenderBody() {
  const wrap = document.getElementById('hsGridWrap');
  const datasets = _hsLastDatasets;
  const dateStr = _hsLastDateStr;
  if (!datasets) return;

  const nowMin = hsNowMinutes(dateStr);
  const hasAny = datasets.some(d => d && d.programs && d.programs.length > 0);
  if (!hasAny) {
    wrap.innerHTML = '<div style="text-align:center;padding:40px;color:var(--ink-soft);font-size:13px;">이 날짜의 홈쇼핑 편성 데이터가 없습니다.</div>';
    return;
  }

  if (hsCategoryFilters.size === 0) {
    wrap.innerHTML = hsRenderGridView(datasets, nowMin);
    if (hsTimeFilter === 'all') hsScrollToCurrentHour(wrap, nowMin);
  } else {
    wrap.innerHTML = hsRenderListView(datasets, nowMin);
  }
}

function hsScrollToCurrentHour(wrap, nowMin) {
  if (nowMin === null) return;
  const hour = Math.floor(nowMin / 60);
  const rows = wrap.querySelectorAll('table.hs-table tbody tr');
  const targetRow = rows[hour];
  const scrollContainer = wrap.querySelector('.hs-scroll');
  if (targetRow && scrollContainer) {
    const offset = targetRow.offsetTop - 40;
    scrollContainer.scrollTop = Math.max(0, offset);
  }
}

function hsRenderGridView(datasets, nowMin) {
  const buckets = {};
  for (let h = 0; h < 24; h++) buckets[h] = HS_COMPANIES.map(() => []);

  datasets.forEach((data, ci) => {
    const programs = (data && data.programs) ? data.programs : [];
    for (const p of programs) {
      if (!p.start) continue;
      const hour = parseInt(p.start.split(':')[0], 10);
      if (hour >= 0 && hour < 24) buckets[hour][ci].push(p);
    }
  });

  let html = '<div class="hs-scroll"><table class="hs-table"><thead><tr>';
  html += '<th class="hs-time-col">시간</th>';
  HS_COMPANIES.forEach(c => {
    html += `<th class="${c.cls}"><span class="hs-co-tag">${c.name}</span></th>`;
  });
  html += '</tr></thead><tbody>';

  for (let h = 0; h < 24; h++) {
    if (!hsHourMatchesTimeFilter(h)) continue;
    html += '<tr>';
    html += `<td class="hs-time-cell">${String(h).padStart(2, '0')}시</td>`;
    HS_COMPANIES.forEach((c, ci) => {
      const progs = buckets[h][ci];
      if (progs.length === 0) {
        html += `<td class="hs-empty-cell hs-co-cell ${c.cls}"></td>`;
      } else {
        let cell = `<td class="hs-co-cell ${c.cls}"><div class="hs-cell-inner">`;
        for (const p of progs) cell += hsRenderProgram(p, nowMin);
        cell += '</div></td>';
        html += cell;
      }
    });
    html += '</tr>';
  }

  html += '</tbody></table></div>';
  return html;
}

function hsRenderListView(datasets, nowMin) {
  const filtered = HS_COMPANIES.map((c, ci) => {
    const programs = (datasets[ci] && datasets[ci].programs) ? datasets[ci].programs : [];
    return programs.filter(hsMatchesFilter);
  });

  const anyMatch = filtered.some(arr => arr.length > 0);
  if (!anyMatch) {
    return '<div style="text-align:center;padding:40px;color:var(--ink-soft);font-size:13px;">해당 카테고리의 편성이 없습니다.</div>';
  }

  let html = '<div class="hs-scroll"><table class="hs-table hs-table-list"><thead><tr>';
  html += '<th class="hs-time-col"></th>';
  HS_COMPANIES.forEach(c => {
    html += `<th class="${c.cls}"><span class="hs-co-tag">${c.name}</span></th>`;
  });
  html += '</tr></thead><tbody><tr>';
  html += '<td class="hs-time-cell"></td>';
  HS_COMPANIES.forEach((c, ci) => {
    const progs = filtered[ci];
    if (progs.length === 0) {
      html += `<td class="hs-empty-cell hs-co-cell ${c.cls}"></td>`;
    } else {
      let cell = `<td class="hs-co-cell ${c.cls}"><div class="hs-cell-inner hs-cell-list">`;
      for (const p of progs) cell += hsRenderProgram(p, nowMin);
      cell += '</div></td>';
      html += cell;
    }
  });
  html += '</tr></tbody></table></div>';
  return html;
}

const MONTH_NAMES = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DATA_MIN_YEAR = 2023;
const DATA_MIN_MONTH = 1;

function renderMonthPickerPanel() {
  document.getElementById('mppYearLabel').textContent = pickerPanelYear;

  const now = new Date();
  const maxYear = now.getFullYear();
  const maxMonth = now.getMonth() + 1;

  let html = '';
  for (let m = 1; m <= 12; m++) {
    const isFuture = pickerPanelYear > maxYear || (pickerPanelYear === maxYear && m > maxMonth);
    const isPast = pickerPanelYear < DATA_MIN_YEAR || (pickerPanelYear === DATA_MIN_YEAR && m < DATA_MIN_MONTH);
    const isCurrent = pickerPanelYear === currentYear && m === currentMonth;
    html += `<button type="button" class="${isCurrent ? 'current' : ''}" ` +
            `${(isFuture || isPast) ? 'disabled' : ''} data-month="${m}">${MONTH_NAMES[m - 1]}</button>`;
  }
  document.getElementById('mppMonthGrid').innerHTML = html;

  document.getElementById('mppPrevYear').disabled = pickerPanelYear <= DATA_MIN_YEAR;
  document.getElementById('mppNextYear').disabled = pickerPanelYear >= maxYear;

  document.getElementById('mppMonthGrid').querySelectorAll('button[data-month]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const m = parseInt(btn.dataset.month, 10);
      currentYear = pickerPanelYear;
      currentMonth = m;
      renderMonth(currentYear, currentMonth);
      document.getElementById('monthPickerPanel').classList.remove('open');
    });
  });
}

function switchTab(tab) {
  const panels = { schedule: 'tabSchedule', weather: 'tabWeather', homeshop: 'tabHomeshop', dramavariety: 'tabDramaVariety', fixedpgm: 'tabFixedPgm' };
  const btns = { schedule: 'tabBtnSchedule', weather: 'tabBtnWeather', homeshop: 'tabBtnHomeshop', dramavariety: 'tabBtnDramaVariety', fixedpgm: 'tabBtnFixedPgm' };

  for (const key in panels) {
    document.getElementById(panels[key]).classList.toggle('active', key === tab);
    document.getElementById(btns[key]).classList.toggle('active', key === tab);
  }

  if (tab === 'weather' && !_weatherTabLoaded) {
    _weatherTabLoaded = true;
    renderMonth(currentYear, currentMonth);
  }
  if (tab === 'homeshop' && !_homeshopTabLoaded) {
    _homeshopTabLoaded = true;
    hsRefresh(hsCurrentDate);
  }
  if (tab === 'dramavariety' && !_dramaVarietyTabLoaded) {
    _dramaVarietyTabLoaded = true;
    dvRefresh(dvWeekStart);
  }
  if (tab === 'fixedpgm' && !_fixedPgmTabLoaded) {
    _fixedPgmTabLoaded = true;
    fpRefresh();
  }
}

// ============ 고정PGM 탭 ============
const FP_COMPANIES = ["HD", "GS", "CJ", "LT"];
const FP_DAYS = ["월", "화", "수", "목", "금", "토", "일"];
let fpCurrentDay = FP_DAYS[(new Date().getDay() + 6) % 7]; // 오늘 요일 기본 선택 (일=0 -> 인덱스 6)
let fpData = null; // merged.json 캐시

async function fpLoadData() {
  if (fpData) return fpData;
  fpData = await fetchJsonSafe('./homeshopping/fixed_programs/merged.json');
  return fpData;
}

function fpFormatUpdated(collectedAt) {
  if (!collectedAt) return '';
  try {
    const d = new Date(collectedAt);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return `최근 갱신: ${y}-${m}-${day} ${hh}:${mm}`;
  } catch (e) {
    return '';
  }
}

function fpEscapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function fpRenderCard(slot, compact) {
  const co = slot.company.toLowerCase();
  const link = slot.detail_link || '#';
  // 이미지가 없거나 로드에 실패해도 카드 자체(회사 배지, 제목, 편성시각)는
  // 항상 그대로 보여야 한다. onerror는 img 태그 자신만 숨기고, 부모인
  // thumb-wrap은 빈 배경(placeholder) 상태로 남아 카드 레이아웃을 유지한다.
  const thumb = (!compact && slot.thumbnail)
    ? `<img src="${fpEscapeHtml(slot.thumbnail)}" alt="${fpEscapeHtml(slot.title)}" loading="lazy" onerror="this.style.display='none'">`
    : '';

  const thumbBlock = compact
    ? '' // 전체 보기에서는 공간이 부족하므로 썸네일 영역 자체를 생략한다.
    : (
        `<div class="fp-thumb-wrap ${co}">` +
          thumb +
          `<span class="fp-co-badge ${co}">${fpEscapeHtml(slot.company)}</span>` +
        `</div>`
      );

  return (
    `<a class="fp-card ${compact ? 'fp-card-compact' : ''}" href="${fpEscapeHtml(link)}" target="_blank" rel="noopener">` +
      thumbBlock +
      `<div class="fp-body">` +
        (compact ? `<span class="fp-co-badge-inline ${co}">${fpEscapeHtml(slot.company)}</span> ` : '') +
        `<div class="fp-title">${fpEscapeHtml(slot.title)}</div>` +
        `<div class="fp-schedule">${fpEscapeHtml(slot.schedule_raw)}</div>` +
      `</div>` +
    `</a>`
  );
}

function fpBuildTableHtml(daySlots, compact) {
  if (daySlots.length === 0) {
    return '<div class="fp-empty-note">표시할 고정 프로그램이 없습니다.</div>';
  }

  // 시간대(행) 목록은 그 요일에 실제로 편성이 있는 시각만 동적으로 만든다.
  const times = [...new Set(daySlots.map(s => s.time))].sort();

  // (time, company) -> [slot, ...] (같은 시간/회사에 두 개 이상 겹치는 경우도 배열로 보관)
  const cellMap = {};
  for (const s of daySlots) {
    const key = `${s.time}__${s.company}`;
    if (!cellMap[key]) cellMap[key] = [];
    cellMap[key].push(s);
  }

  let html = `<table class="fp-table ${compact ? 'fp-table-compact' : ''}"><thead><tr>`;
  html += '<th class="fp-time-col">시간대</th>';
  for (const co of FP_COMPANIES) {
    html += `<th class="${co.toLowerCase()}"><span class="hs-co-tag" style="background:var(--${co.toLowerCase()})">${co}</span></th>`;
  }
  html += '</tr></thead><tbody>';

  for (const time of times) {
    html += `<tr><td class="fp-time-cell">${fpEscapeHtml(time)}</td>`;
    for (const co of FP_COMPANIES) {
      const key = `${time}__${co}`;
      const cellSlots = cellMap[key];
      if (cellSlots && cellSlots.length) {
        html += `<td class="fp-co-cell ${co.toLowerCase()}">` +
          cellSlots.map(s => fpRenderCard(s, compact)).join('') +
          `</td>`;
      } else {
        html += `<td class="fp-empty-cell"></td>`;
      }
    }
    html += '</tr>';
  }

  html += '</tbody></table>';
  return html;
}

function fpBuildAllDaysTableHtml(allSlots) {
  if (allSlots.length === 0) {
    return '<div class="fp-empty-note">표시할 고정 프로그램이 없습니다.</div>';
  }

  // 시간대(행) 목록은 7일 전체를 통틀어 실제 편성이 있는 시각만 동적으로 만든다.
  const times = [...new Set(allSlots.map(s => s.time))].sort();

  // (time, day) -> [slot, ...] (같은 시간/요일에 여러 회사가 겹치면 배열로 보관)
  const cellMap = {};
  for (const s of allSlots) {
    const key = `${s.time}__${s.day}`;
    if (!cellMap[key]) cellMap[key] = [];
    cellMap[key].push(s);
  }

  let html = '<table class="fp-table fp-table-allday"><thead><tr>';
  html += '<th class="fp-time-col">시간대</th>';
  for (const day of FP_DAYS) {
    html += `<th>${fpEscapeHtml(day)}</th>`;
  }
  html += '</tr></thead><tbody>';

  for (const time of times) {
    html += `<tr><td class="fp-time-cell">${fpEscapeHtml(time)}</td>`;
    for (const day of FP_DAYS) {
      const key = `${time}__${day}`;
      const cellSlots = cellMap[key];
      if (cellSlots && cellSlots.length) {
        html += `<td class="fp-co-cell">` +
          `<div class="fp-cell-row">` +
          cellSlots.map(s => fpRenderCard(s, true)).join('') +
          `</div>` +
          `</td>`;
      } else {
        html += `<td class="fp-empty-cell"></td>`;
      }
    }
    html += '</tr>';
  }

  html += '</tbody></table>';
  return html;
}

function fpRenderGrid(data) {
  const wrap = document.getElementById('fpGridWrap');
  if (!wrap) return;

  if (!data || !Array.isArray(data.slots)) {
    wrap.innerHTML = '<div class="fp-empty-note">고정 프로그램 데이터를 불러오지 못했습니다.</div>';
    return;
  }

  if (fpCurrentDay === '전체') {
    // 시간대(행) x 요일(열) 그리드. 각 요일 칸 안에 그 시간대 모든 회사
    // 카드를 가로로 나란히 배치한다 (이미지는 생략해 가볍게).
    wrap.innerHTML = fpBuildAllDaysTableHtml(data.slots);
    return;
  }

  const daySlots = data.slots.filter(s => s.day === fpCurrentDay);

  if (daySlots.length === 0) {
    wrap.innerHTML = `<div class="fp-empty-note">${fpEscapeHtml(fpCurrentDay)}요일에 표시할 고정 프로그램이 없습니다.</div>`;
    return;
  }

  wrap.innerHTML = fpBuildTableHtml(daySlots, false);
}

async function fpRefresh() {
  const wrap = document.getElementById('fpGridWrap');
  if (wrap) wrap.innerHTML = '<div class="fp-empty-note">불러오는 중...</div>';

  const data = await fpLoadData();

  const updatedEl = document.getElementById('fpUpdated');
  if (updatedEl) updatedEl.textContent = data ? fpFormatUpdated(data.collectedAt) : '';

  fpRenderGrid(data);
}

document.querySelectorAll('.fp-day-btn').forEach(btn => {
  if (btn.dataset.day === fpCurrentDay) btn.classList.add('active');
  btn.addEventListener('click', () => {
    fpCurrentDay = btn.dataset.day;
    document.querySelectorAll('.fp-day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    fpRenderGrid(fpData);
  });
});

(async function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;
  hsCurrentDate = toLocalDateStr(now);
  dvWeekStart = dvMondayOf(toLocalDateStr(now));

  const picker = document.getElementById('datePicker');
  picker.value = toLocalDateStr(now);
  picker.min = SCHEDULE_MIN_DATE;

  _homeshopTabLoaded = true;
  await hsRefresh(hsCurrentDate);

  await refresh(picker.value);

  document.getElementById('searchBtn').addEventListener('click', () => {
    if (picker.value < SCHEDULE_MIN_DATE) picker.value = SCHEDULE_MIN_DATE;
    refresh(picker.value);
  });

  document.getElementById('prevDay').addEventListener('click', () => {
    if (picker.value <= SCHEDULE_MIN_DATE) return;
    picker.value = shiftDate(picker.value, -1);
    refresh(picker.value);
  });
  document.getElementById('nextDay').addEventListener('click', () => {
    picker.value = shiftDate(picker.value, 1);
    refresh(picker.value);
  });

  document.getElementById('gotoToday').addEventListener('click', () => {
    const today = toLocalDateStr(new Date());
    picker.value = today;
    refresh(today);
  });

  picker.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') refresh(picker.value);
  });
  picker.addEventListener('change', () => {
    if (picker.value < SCHEDULE_MIN_DATE) picker.value = SCHEDULE_MIN_DATE;
    refresh(picker.value);
  });

  document.getElementById('tabBtnSchedule').addEventListener('click', () => switchTab('schedule'));
  document.getElementById('tabBtnWeather').addEventListener('click', () => switchTab('weather'));
  document.getElementById('tabBtnHomeshop').addEventListener('click', () => switchTab('homeshop'));
  document.getElementById('tabBtnDramaVariety').addEventListener('click', () => switchTab('dramavariety'));
  document.getElementById('tabBtnFixedPgm').addEventListener('click', () => switchTab('fixedpgm'));

  const hsPicker = document.getElementById('hsDatePicker');
  hsPicker.value = hsCurrentDate;
  hsPicker.min = HS_MIN_DATE;
  document.getElementById('hsPrevDay').addEventListener('click', () => {
    if (hsCurrentDate <= HS_MIN_DATE) return;
    hsCurrentDate = shiftDate(hsCurrentDate, -1);
    hsPicker.value = hsCurrentDate;
    hsRefresh(hsCurrentDate);
  });
  document.getElementById('hsNextDay').addEventListener('click', () => {
    hsCurrentDate = shiftDate(hsCurrentDate, 1);
    hsPicker.value = hsCurrentDate;
    hsRefresh(hsCurrentDate);
  });
  hsPicker.addEventListener('change', () => {
    hsCurrentDate = hsPicker.value < HS_MIN_DATE ? HS_MIN_DATE : hsPicker.value;
    hsPicker.value = hsCurrentDate;
    hsRefresh(hsCurrentDate);
  });

  document.querySelectorAll('#hsToggle .hs-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      hsCurrentBc = btn.dataset.bc;
      document.querySelectorAll('#hsToggle .hs-toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      hsRefresh(hsCurrentDate);
    });
  });

  document.querySelectorAll('#hsTimeToggle .hs-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      hsTimeFilter = btn.dataset.time;
      document.querySelectorAll('#hsTimeToggle .hs-toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      hsRenderBody();
    });
  });

  document.querySelectorAll('#weatherRegionToggle .hs-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      weatherCurrentRegion = btn.dataset.region;
      document.querySelectorAll('#weatherRegionToggle .hs-toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderMonth(currentYear, currentMonth);
    });
  });

  document.getElementById('prevMonth').addEventListener('click', () => {
    if (currentYear === DATA_MIN_YEAR && currentMonth === DATA_MIN_MONTH) return;
    currentMonth -= 1;
    if (currentMonth < 1) { currentMonth = 12; currentYear -= 1; }
    renderMonth(currentYear, currentMonth);
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    const now = new Date();
    if (currentYear === now.getFullYear() && currentMonth === now.getMonth() + 1) return;
    currentMonth += 1;
    if (currentMonth > 12) { currentMonth = 1; currentYear += 1; }
    renderMonth(currentYear, currentMonth);
  });

  document.getElementById('monthLabelWrap').addEventListener('click', (e) => {
    const panel = document.getElementById('monthPickerPanel');
    const isOpen = panel.classList.contains('open');
    if (isOpen) {
      panel.classList.remove('open');
    } else {
      pickerPanelYear = currentYear;
      renderMonthPickerPanel();
      panel.classList.add('open');
    }
    e.stopPropagation();
  });

  document.addEventListener('click', (e) => {
    const wrap = document.getElementById('monthLabelWrap');
    if (!wrap.contains(e.target)) {
      document.getElementById('monthPickerPanel').classList.remove('open');
    }
  });

  document.getElementById('mppPrevYear').addEventListener('click', (e) => {
    e.stopPropagation();
    pickerPanelYear -= 1;
    renderMonthPickerPanel();
  });
  document.getElementById('mppNextYear').addEventListener('click', (e) => {
    e.stopPropagation();
    pickerPanelYear += 1;
    renderMonthPickerPanel();
  });

  document.getElementById('dvPrevWeek').addEventListener('click', () => {
    if (dvWeekStart <= DV_MIN_WEEK_START) return;
    dvWeekStart = dvShiftWeek(dvWeekStart, -1);
    dvRefresh(dvWeekStart);
  });
  document.getElementById('dvNextWeek').addEventListener('click', () => {
    dvWeekStart = dvShiftWeek(dvWeekStart, 1);
    dvRefresh(dvWeekStart);
  });

  const dvPicker = document.getElementById('dvWeekPicker');
  dvPicker.min = DV_MIN_WEEK_START;
  dvPicker.value = dvWeekStart;
  dvPicker.addEventListener('change', () => {
    let picked = dvPicker.value;
    if (picked < DV_MIN_WEEK_START) picked = DV_MIN_WEEK_START;
    let monday = dvMondayOf(picked);
    if (monday < DV_MIN_WEEK_START) monday = DV_MIN_WEEK_START;
    dvWeekStart = monday;
    dvRefresh(dvWeekStart);
  });

  document.querySelectorAll('.dv-slicer-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      dvFilter = btn.dataset.filter;
      document.querySelectorAll('.dv-slicer-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      dvRenderGrid(dvCache[dvWeekStart]);
    });
  });
})();
